# deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  labels:
    app: django-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      containers:
        - name: django-app
          image: testdjangoapp:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "testsite.settings"
            - name: DEBUG
              value: "False"
            - name: ALLOWED_HOSTS
              value: "*"
            - name: DJANGO_SECRET_KEY
              value: "django-insecure-some-long-random-string-for-dev-only"
          readinessProbe:
            httpGet:
              path: /polls/health/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
