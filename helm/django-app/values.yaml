replicaCount: 1

image:
  repository: docker-agi.355592e.registry.nineapis.ch/test-django-app
  tag: "latest"

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: django.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  DJANGO_SECRET_KEY: "change-me-in-a-secret"
  DEBUG: "False"
  ALLOWED_HOSTS: "*"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  enabled: true
