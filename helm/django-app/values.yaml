replicaCount: 1

image:
  repository: docker-agi.355592e.registry.nineapis.ch/django-test-app
  tag: "latest"
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: regcred

service:
  type: ClusterIP
  port: 80
  targetPort: http

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: ""
  paths:
    - path: /
      pathType: Prefix
  tls: []

env:
  DJANGO_SECRET_KEY: "change-me-in-a-secret"
  DEBUG: "False"
  ALLOWED_HOSTS: "*"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  enabled: true
  path: /polls/health

serviceAccount:
  create: true
  name: ""
  imagePullSecrets:
    - name: regcred
